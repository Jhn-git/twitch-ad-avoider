<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self' http://127.0.0.1:* https://*.twitch.tv https://*.ttvnw.net https://static-cdn.jtvnw.net data: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; media-src 'self' http://127.0.0.1:* blob:; img-src 'self' https://*.twitch.tv https://*.ttvnw.net https://static-cdn.jtvnw.net data:;" />
<title>TwitchAdAvoider - Stream Manager</title>
<style>
  :root {
    --bg: #0f1012;
    --rail: #151619;
    --rail-2: #101114;
    --panel: #191b20;
    --panel-2: #202228;
    --field: #101114;
    --ink: #f4f5f7;
    --ink-2: #c3c8d2;
    --ink-3: #88909d;
    --ink-4: #5f6672;
    --line: rgba(255,255,255,0.09);
    --line-2: rgba(255,255,255,0.17);
    --accent: #20c86b;
    --accent-2: #149a53;
    --accent-soft: rgba(32,200,107,0.15);
    --bad: #ff5b6e;
    --warn: #ffba57;
    --shadow: rgba(0,0,0,0.28);
    --radius: 7px;
  }

  [data-theme="light"] {
    --bg: #f5f5f7;
    --rail: #ffffff;
    --rail-2: #f1f2f5;
    --panel: #ffffff;
    --panel-2: #eceef2;
    --field: #f8f9fb;
    --ink: #101114;
    --ink-2: #333842;
    --ink-3: #667080;
    --ink-4: #8b93a0;
    --line: rgba(0,0,0,0.10);
    --line-2: rgba(0,0,0,0.18);
    --shadow: rgba(0,0,0,0.12);
  }

  * { box-sizing: border-box; }
  html, body, #root { width: 100%; height: 100%; margin: 0; }
  body {
    overflow: hidden;
    background: var(--bg);
    color: var(--ink);
    font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 14px;
    letter-spacing: 0;
    -webkit-font-smoothing: antialiased;
  }
  button, input, select { font: inherit; }
  button { letter-spacing: 0; }

  .app-shell {
    --left-rail-width: 216px;
    --right-rail-width: 215px;
    width: 100%;
    height: 100%;
    display: grid;
    grid-template-columns: var(--left-rail-width) minmax(560px, 1fr) var(--right-rail-width);
    background: var(--bg);
  }
  .app-shell.left-collapsed { --left-rail-width: 66px; }
  .app-shell.right-collapsed { --right-rail-width: 66px; }

  .rail {
    min-width: 0;
    height: 100%;
    background: var(--rail);
    border-color: var(--line);
    display: flex;
    flex-direction: column;
  }
  .rail.left { border-right: 1px solid var(--line); }
  .rail.right { border-left: 1px solid var(--line); }
  .rail-head {
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 0 14px 0 18px;
    font-weight: 700;
  }
  .rail-title { font-size: 14px; color: var(--ink); }
  .rail-actions { display: flex; align-items: center; gap: 4px; }
  .rail-toggle .icon { transition: transform 140ms ease; }
  .rail.left .rail-toggle .icon { transform: rotate(180deg); }
  .rail.left.collapsed .rail-toggle .icon { transform: rotate(0deg); }
  .rail.right .rail-toggle .icon { transform: rotate(0deg); }
  .rail.right.collapsed .rail-toggle .icon { transform: rotate(180deg); }

  .rail.collapsed .rail-head {
    justify-content: center;
    padding: 0;
  }
  .rail.collapsed .rail-title,
  .rail.collapsed .fav-name,
  .rail.collapsed .favorite-row .rail-actions,
  .rail.collapsed .add-favorite span {
    display: none;
  }
  .rail.collapsed .rail-actions { gap: 0; }

  .icon-btn {
    width: 30px;
    height: 30px;
    border: 0;
    border-radius: 6px;
    background: transparent;
    color: var(--ink-3);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .icon-btn:hover { background: var(--panel-2); color: var(--ink); }
  .icon {
    width: 16px;
    height: 16px;
    display: inline-block;
    flex: 0 0 auto;
  }

  .favorites-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px 10px 12px 14px;
  }
  .rail.left.collapsed .favorites-list {
    padding: 5px 10px 12px;
  }
  .favorite-row {
    width: 100%;
    min-height: 54px;
    border: 1px solid transparent;
    border-radius: 7px;
    background: transparent;
    color: var(--ink-2);
    display: grid;
    grid-template-columns: 38px 1fr auto;
    align-items: center;
    gap: 8px;
    padding: 7px 8px;
    cursor: pointer;
    text-align: left;
  }
  .favorite-row:hover { background: var(--panel); color: var(--ink); }
  .rail.left.collapsed .favorite-row {
    min-height: 46px;
    grid-template-columns: 1fr;
    justify-items: center;
    padding: 6px 0;
  }
  .favorite-row.selected {
    background: var(--accent-soft);
    color: var(--ink);
    border-color: rgba(32,200,107,0.55);
  }
  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background:
      repeating-linear-gradient(45deg, rgba(255,255,255,0.06) 0 4px, transparent 4px 8px),
      var(--panel-2);
    border: 1px solid var(--line);
    position: relative;
    overflow: visible;
    transition: border-color 140ms ease, box-shadow 140ms ease, opacity 140ms ease;
  }
  .avatar.has-image {
    background: var(--panel-2);
  }
  .avatar.has-image:not(.live) {
    border-color: rgba(255,255,255,0.07);
    opacity: 0.72;
  }
  .avatar.live {
    border-color: rgba(32,200,107,0.88);
    box-shadow:
      0 0 0 1px rgba(32,200,107,0.22),
      0 0 16px rgba(32,200,107,0.48);
  }
  .avatar img {
    width: 100%;
    height: 100%;
    display: block;
    border-radius: 50%;
    object-fit: cover;
    transition: filter 140ms ease, opacity 140ms ease;
  }
  .avatar.has-image:not(.live) img {
    filter: grayscale(1) saturate(0.28) brightness(0.72);
    opacity: 0.82;
  }
  .avatar.live img {
    filter: saturate(1.12) contrast(1.04);
  }
  .avatar.live::after {
    content: "";
    position: absolute;
    width: 10px;
    height: 10px;
    right: -1px;
    bottom: -1px;
    border: 2px solid var(--rail);
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 10px rgba(32,200,107,0.82);
  }
  .fav-name {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-weight: 500;
  }
  .favorite-row.selected .fav-name { font-weight: 700; }
  .pin {
    color: var(--ink-4);
    opacity: 0;
  }
  .favorite-row:hover .pin,
  .favorite-row.pinned .pin { opacity: 1; }

  .add-favorite {
    margin: 10px 14px 14px;
    min-height: 34px;
    border: 1px dashed var(--line-2);
    background: transparent;
    color: var(--ink-3);
    border-radius: 6px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
  }
  .add-favorite:hover { color: var(--ink); border-color: var(--accent); }
  .rail.left.collapsed .add-favorite {
    width: 42px;
    min-height: 36px;
    margin: 10px auto 14px;
    padding: 0;
  }

  .stage {
    --stage-content-width: min(1360px, 100%, max(620px, calc((100vh - 232px) * 16 / 9)));
    min-width: 0;
    height: 100%;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 46px 84px;
  }
  .channel-meta {
    width: var(--stage-content-width);
    min-height: 48px;
    text-align: center;
  }
  .channel-name {
    font-size: 22px;
    line-height: 1.15;
    font-weight: 800;
    margin: 0;
  }
  .channel-title {
    margin-top: 6px;
    color: var(--ink-3);
    font-size: 12px;
    line-height: 1.35;
    min-height: 17px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .player-shell {
    width: var(--stage-content-width);
    aspect-ratio: 16 / 9;
    background:
      repeating-linear-gradient(135deg, rgba(255,255,255,0.035) 0 10px, transparent 10px 20px),
      #050607;
    border: 1px solid var(--line-2);
    border-radius: 8px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 16px 42px var(--shadow);
  }
  .player-shell video {
    width: 100%;
    height: 100%;
    display: block;
    background: #000;
  }
  .player-shell video::-webkit-media-controls-timeline {
    display: none;
  }
  .stream-preview-image {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
    background: #050607;
  }
  .placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-4);
    font: 500 13px/1.2 Consolas, "Cascadia Mono", monospace;
  }
  .live-badge {
    position: absolute;
    left: 22px;
    top: 18px;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 5px 8px;
    border-radius: 5px;
    background: rgba(0,0,0,0.62);
    color: var(--ink);
    font-size: 11px;
    font-weight: 800;
  }
  .live-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
  }
  .scrub-row {
    width: var(--stage-content-width);
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 14px;
  }
  .scrub-track {
    flex: 1;
    position: relative;
    height: 12px;
    border-radius: 4px;
    background: var(--panel-2);
    border: 1px solid var(--line-2);
    cursor: pointer;
    overflow: hidden;
  }
  /* One band per recorded segment, scaled across the whole session
     (stream start -> now), same data the old standalone day-timeline used. */
  .scrub-segment {
    position: absolute;
    top: 0;
    bottom: 0;
    background: var(--ink-4);
    pointer-events: none;
  }
  .scrub-segment.is-current {
    background: var(--accent-soft);
  }
  /* The sub-range of the segment above that's actually buffered and
     scrubbable right now - rendered solid so it visually pops out of the
     muted is-current band behind it. */
  .scrub-live-window {
    position: absolute;
    top: 0;
    bottom: 0;
    left: 0%;
    width: 100%;
    display: flex;
    align-items: center;
    background: var(--accent);
    cursor: pointer;
    touch-action: none;
  }
  .scrub-fill {
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    height: 4px;
    width: 0%;
    border-radius: 2px;
    background: #06130b;
    opacity: 0.35;
    pointer-events: none;
  }
  .scrub-thumb {
    position: absolute;
    left: 0%;
    top: 50%;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--ink);
    transform: translate(-50%, -50%);
    box-shadow: 0 1px 4px var(--shadow);
    pointer-events: none;
  }
  .go-live-btn {
    padding: 0 12px;
    font-size: 12px;
  }
  .go-live-btn:not(.is-live) {
    background: var(--accent);
    border-color: var(--accent);
    color: #06130b;
  }
  .go-live-btn:not(.is-live):hover {
    background: #27d878;
  }
  .stage-actions {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-top: 20px;
  }
  .clip-split {
    display: inline-flex;
    align-items: stretch;
    position: relative;
    min-height: 38px;
  }
  .clip-split .btn.primary {
    min-height: 38px;
    border-right: 0;
    border-radius: 7px 0 0 7px;
  }
  .clip-split .btn.primary:hover + .clip-duration-dropdown .clip-menu-button {
    background: #27d878;
  }
  .clip-duration-dropdown {
    width: 34px;
    min-width: 34px;
    display: flex;
    align-items: stretch;
  }
  .clip-duration-dropdown .clip-menu-button {
    width: 34px;
    min-height: 38px;
    height: 100%;
    border: 1px solid var(--accent);
    border-left: 1px solid rgba(0,0,0,0.22);
    border-radius: 0 7px 7px 0;
    background: var(--accent-2);
    color: #06130b;
    cursor: pointer;
    padding: 0;
    justify-content: center;
  }
  .clip-menu-button:hover { background: #19b960; }
  .clip-menu-button .dropdown-value { display: none; }
  .clip-menu-button .icon { width: 14px; height: 14px; }
  .clip-duration-dropdown .dropdown-menu {
    right: 0;
    left: auto;
    min-width: 126px;
  }

  .btn {
    min-height: 38px;
    border: 1px solid var(--line-2);
    border-radius: 7px;
    background: transparent;
    color: var(--ink);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 0 16px;
    font-weight: 700;
    cursor: pointer;
  }
  .btn:hover { background: var(--panel-2); }
  .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #06130b;
  }
  .btn.primary:hover { background: #27d878; }
  .btn.block { width: 100%; }
  .btn:disabled {
    color: var(--ink-4);
    border-color: var(--line);
    background: transparent;
    cursor: default;
  }

  .dropdown {
    position: relative;
    min-width: 0;
  }
  .dropdown-button {
    width: 100%;
    min-height: 37px;
    border: 1px solid var(--line-2);
    border-radius: 7px;
    background: var(--field);
    color: var(--ink);
    display: inline-flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 0 10px;
    cursor: pointer;
  }
  .dropdown-button:hover,
  .dropdown.open .dropdown-button {
    border-color: rgba(32,200,107,0.42);
    background: var(--panel);
  }
  .clip-duration-dropdown .clip-menu-button:hover,
  .clip-duration-dropdown.open .clip-menu-button {
    border-color: var(--accent);
    border-left-color: rgba(0,0,0,0.22);
    background: #19b960;
  }
  .dropdown-value {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .dropdown-menu {
    position: absolute;
    z-index: 30;
    top: calc(100% + 6px);
    bottom: auto;
    left: 0;
    width: 100%;
    min-width: 112px;
    overflow-y: auto;
    padding: 5px;
    border: 1px solid var(--line-2);
    border-radius: 7px;
    background: var(--rail);
    box-shadow: 0 14px 36px var(--shadow);
  }
  .dropdown-up .dropdown-menu {
    top: auto;
    bottom: calc(100% + 6px);
  }
  .dropdown-option {
    width: 100%;
    min-height: 32px;
    border: 0;
    border-radius: 5px;
    background: transparent;
    color: var(--ink-2);
    display: flex;
    align-items: center;
    justify-content: flex-start;
    padding: 0 9px;
    text-align: left;
    cursor: pointer;
  }
  .dropdown-option:hover,
  .dropdown-option.selected {
    background: var(--accent-soft);
    color: var(--ink);
  }
  .dropdown-option.selected {
    font-weight: 800;
  }

  .options-body {
    padding: 0 13px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .field-label {
    margin: 8px 0 2px 2px;
    color: var(--ink-3);
    font-size: 11px;
    text-transform: uppercase;
  }
  .input, .select {
    width: 100%;
    min-height: 37px;
    border: 1px solid var(--line-2);
    border-radius: 7px;
    background: var(--field);
    color: var(--ink);
    padding: 0 10px;
  }
  .select { cursor: pointer; }
  .quality-dropdown { width: 100%; }
  .icon-command {
    width: 42px;
    height: 42px;
    border: 1px solid var(--line-2);
    border-radius: 7px;
    background: transparent;
    color: var(--ink);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .icon-command:hover { background: var(--panel-2); }
  .icon-command.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #06130b;
  }
  .icon-command:disabled {
    color: var(--ink-4);
    border-color: var(--line);
    background: transparent;
    cursor: default;
  }
  .rail.right.collapsed .options-body {
    padding: 0;
    align-items: center;
  }
  .compact-actions {
    gap: 9px;
  }
  .right-spacer { flex: 1; }

  .activity-tab {
    position: absolute;
    bottom: 2px;
    left: 50%;
    transform: translateX(-50%);
    height: 28px;
    padding: 0 12px;
    border: 1px solid var(--line);
    border-bottom: 0;
    border-radius: 7px 7px 0 0;
    background: var(--rail-2);
    color: var(--ink-2);
    font-size: 12px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 7px;
  }
  .activity-drawer {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 250px;
    background: rgba(16,17,20,0.98);
    border-top: 1px solid var(--line);
    transform: translateY(100%);
    transition: transform 160ms ease;
    z-index: 10;
    display: flex;
    flex-direction: column;
  }
  .activity-drawer.open { transform: translateY(0); }
  .activity-head {
    height: 42px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 18px;
    border-bottom: 1px solid var(--line);
    font-weight: 700;
  }
  .activity-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 18px 14px;
  }
  .activity-entry {
    min-height: 28px;
    display: grid;
    grid-template-columns: 72px 76px 1fr;
    gap: 10px;
    align-items: center;
    color: var(--ink-2);
    font-size: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .activity-entry .time,
  .activity-entry .category { color: var(--ink-4); }
  .activity-entry.success .message { color: var(--accent); }
  .activity-entry.error .message { color: var(--bad); }
  .activity-entry.warning .message { color: var(--warn); }

  .settings-overlay {
    position: fixed;
    inset: 0;
    z-index: 50;
    background: var(--bg);
  }
  .settings-view {
    width: min(920px, 100%);
    margin: 0 auto;
    padding-bottom: 40px;
  }
  .settings-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
  }
  .settings-title { margin: 0; font-size: 22px; }
  .settings-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(260px, 1fr));
    gap: 14px;
  }
  .settings-section {
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 14px;
    background: var(--rail);
  }
  .settings-section h3 {
    margin: 0 0 10px;
    font-size: 13px;
  }
  .setting-field {
    min-height: 36px;
    display: grid;
    grid-template-columns: minmax(120px, 1fr) minmax(96px, 150px);
    align-items: center;
    gap: 12px;
    color: var(--ink-2);
    font-size: 12px;
  }
  .setting-field input[type="checkbox"] {
    justify-self: end;
    width: 18px;
    height: 18px;
    accent-color: var(--accent);
  }
  .setting-field input,
  .setting-field select {
    min-width: 0;
    min-height: 31px;
    border: 1px solid var(--line-2);
    border-radius: 6px;
    background: var(--field);
    color: var(--ink);
    padding: 0 8px;
  }
  .field-error {
    grid-column: 2;
    color: var(--bad);
    font-size: 11px;
  }
  .settings-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 16px;
  }

  .toast-stack {
    position: fixed;
    right: 16px;
    top: 16px;
    z-index: 20;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .toast {
    min-width: 210px;
    max-width: 340px;
    border: 1px solid var(--line-2);
    border-radius: 7px;
    background: var(--rail);
    box-shadow: 0 10px 28px var(--shadow);
    padding: 10px 12px;
    color: var(--ink);
    font-size: 13px;
  }
  .toast.success { border-color: rgba(32,200,107,0.58); }
  .toast.error { border-color: rgba(255,91,110,0.66); }
  .toast.warning { border-color: rgba(255,186,87,0.66); }

  .empty-state {
    color: var(--ink-4);
    font-size: 13px;
    padding: 12px;
  }
  .loading {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-3);
  }

  @media (max-width: 1080px) {
    .app-shell {
      --left-rail-width: 190px;
      --right-rail-width: 190px;
      grid-template-columns: var(--left-rail-width) minmax(420px, 1fr) var(--right-rail-width);
    }
    .app-shell.left-collapsed { --left-rail-width: 66px; }
    .app-shell.right-collapsed { --right-rail-width: 66px; }
    .stage { padding-left: 24px; padding-right: 24px; }
  }
